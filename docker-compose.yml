services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dailyflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dailyflow}
      POSTGRES_DB: ${POSTGRES_DB:-dailyflow}
    ports:
      - '5432:5432'
    volumes:
      - dailyflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dailyflow} -d ${POSTGRES_DB:-dailyflow}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://dailyflow:dailyflow@postgres:5432/dailyflow}
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  telegram-bot:
    build:
      context: ./telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://dailyflow:dailyflow@postgres:5432/dailyflow}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./telegram-bot:/app

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    ports:
      - '5173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - dailyflow_frontend_node_modules:/app/node_modules

volumes:
  dailyflow_postgres_data:
  dailyflow_frontend_node_modules:
